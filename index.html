<!-- Di dalam navbar, tambahkan setelah ordersLink -->
<a id="chatLink">Chat Admin</a>

<!-- Di dalam container, tambahkan panel chat -->
<div id="chatPanel" style="display:none;">
    <div class="card">
        <h2 class="section-title">Chat dengan Admin</h2>
        <div id="chatMessages" style="height:400px; overflow-y:auto; background:#f8fafc; border-radius:1rem; padding:1rem; margin-bottom:1rem;"></div>
        <div style="display:flex; gap:0.5rem;">
            <input type="text" id="chatMessageInput" class="form-control" placeholder="Ketik pesan...">
            <button class="btn btn-primary" id="sendChatBtn">Kirim</button>
        </div>
    </div>
</div>

<script>
    // Tambahkan kode chat di buyer
    let currentUserEmail = null;

    // Fungsi untuk mendapatkan email pembeli (misal dari input di tagihan, atau kita buat input khusus)
    // Untuk memudahkan, kita akan meminta pembeli memasukkan email di awal atau mengambil dari localStorage.
    // Kita bisa tambahkan input email di chat panel jika belum ada.

    function renderBuyerChat() {
        const messagesDiv = document.getElementById('chatMessages');
        if (!currentUserEmail) {
            messagesDiv.innerHTML = '<div>Masukkan email Anda untuk memulai chat.</div>';
            return;
        }
        const relevantMessages = chats.filter(msg =>
            (msg.from === 'admin' && msg.toEmail === currentUserEmail) ||
            (msg.from === 'buyer' && msg.fromEmail === currentUserEmail)
        );
        messagesDiv.innerHTML = '';
        relevantMessages.forEach(msg => {
            const msgDiv = document.createElement('div');
            msgDiv.className = `chat-message ${msg.from}`;
            const bubble = document.createElement('div');
            bubble.className = 'chat-bubble';
            bubble.innerHTML = `${msg.message}<span class="chat-time">${new Date(msg.timestamp).toLocaleString()}</span>`;
            msgDiv.appendChild(bubble);
            messagesDiv.appendChild(msgDiv);
        });
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    function sendBuyerChat() {
        const input = document.getElementById('chatMessageInput');
        const message = input.value.trim();
        if (!message || !currentUserEmail) return;
        const newMsg = {
            id: Date.now().toString(),
            from: 'buyer',
            fromEmail: currentUserEmail,
            to: 'admin',
            message: message,
            timestamp: new Date().toISOString(),
            read: false
        };
        chats.push(newMsg);
        saveChats();
        input.value = '';
        renderBuyerChat();
    }

    // Di buyer, kita perlu form input email jika belum ada.
    // Kita bisa tambahkan input email di chat panel.
    document.getElementById('chatLink').addEventListener('click', () => {
        // Tampilkan panel chat dan minta email jika belum ada
        if (!currentUserEmail) {
            const email = prompt('Masukkan email Anda untuk memulai chat:');
            if (email && email.includes('@')) {
                currentUserEmail = email;
                localStorage.setItem('buyerChatEmail', email);
                renderBuyerChat();
            } else {
                alert('Email tidak valid');
                return;
            }
        }
        // tampilkan panel chat (sembunyikan yang lain)
        homePanel.style.display = 'none';
        invoicesPanelDiv.style.display = 'none';
        ordersPanelDiv.style.display = 'none';
        chatPanelDiv.style.display = 'block';
        renderBuyerChat();
    });
</script>
