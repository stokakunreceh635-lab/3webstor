<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3DXO Store - Jasa Pembuatan Website</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Inter',sans-serif; }
        body { background:linear-gradient(145deg,#f9fafb 0%,#f3f4f6 100%); color:#1f2937; }
        .container { max-width:1400px; margin:0 auto; padding:0 1.5rem; }
        .logo { display:flex; align-items:center; gap:0.5rem; font-size:2rem; font-weight:800; background:linear-gradient(135deg,#1e3a8a,#3b82f6); -webkit-background-clip:text; background-clip:text; color:transparent; }
        .logo span { background:#f59e0b; padding:0.2rem 0.6rem; border-radius:1rem; color:white; font-size:1.2rem; }
        .navbar { background:white; border-radius:2rem; padding:1rem 2rem; display:flex; justify-content:space-between; align-items:center; margin-bottom:2rem; box-shadow:0 5px 20px rgba(0,0,0,0.05); }
        .nav-links { display:flex; gap:1.5rem; align-items:center; }
        .nav-links a { text-decoration:none; color:#4b5563; font-weight:600; transition:0.2s; cursor:pointer; }
        .nav-links a:hover { color:#3b82f6; }
        .cart-icon { position:relative; cursor:pointer; font-size:1.3rem; }
        .cart-count { position:absolute; top:-8px; right:-12px; background:#ef4444; color:white; border-radius:50%; width:20px; height:20px; display:flex; align-items:center; justify-content:center; font-size:0.7rem; font-weight:bold; }
        .hero { background:linear-gradient(145deg,#1e3a8a,#3b82f6); border-radius:2rem; padding:3rem; color:white; margin-bottom:2rem; text-align:center; }
        .hero h1 { font-size:2.5rem; margin-bottom:1rem; }
        .product-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:2rem; margin:2rem 0; }
        .product-card { background:white; border-radius:1.5rem; overflow:hidden; box-shadow:0 10px 25px -5px rgba(0,0,0,0.05); transition:0.3s; }
        .product-card:hover { transform:translateY(-8px); box-shadow:0 20px 30px -10px rgba(0,0,0,0.15); }
        .product-img { height:200px; background:#e2e8f0; display:flex; align-items:center; justify-content:center; overflow:hidden; }
        .product-img img { width:100%; height:100%; object-fit:cover; }
        .product-info { padding:1.2rem; }
        .product-title { font-weight:700; font-size:1.2rem; margin-bottom:0.3rem; }
        .product-category { font-size:0.8rem; color:#3b82f6; font-weight:600; }
        .product-price { font-weight:800; color:#1e293b; margin:0.5rem 0; font-size:1.2rem; }
        .product-desc { font-size:0.9rem; color:#4b5563; margin-bottom:1rem; }
        .btn { padding:0.6rem 1.2rem; border-radius:2rem; font-weight:600; cursor:pointer; transition:0.2s; border:none; }
        .btn-primary { background:#3b82f6; color:white; }
        .btn-primary:hover { background:#2563eb; transform:translateY(-2px); }
        .btn-outline { background:white; border:2px solid #3b82f6; color:#3b82f6; }
        .btn-outline:hover { background:#3b82f6; color:white; }
        .cart-sidebar { position:fixed; top:0; right:-400px; width:380px; height:100vh; background:white; box-shadow:-5px 0 20px rgba(0,0,0,0.1); transition:0.3s; z-index:1000; padding:1.5rem; display:flex; flex-direction:column; }
        .cart-sidebar.open { right:0; }
        .cart-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:1.5rem; }
        .close-cart { background:none; border:none; font-size:1.5rem; cursor:pointer; }
        .cart-items { flex:1; overflow-y:auto; }
        .cart-item { display:flex; justify-content:space-between; align-items:center; padding:0.8rem 0; border-bottom:1px solid #e2e8f0; }
        .cart-item-info h4 { font-size:1rem; }
        .cart-item-price { font-size:0.9rem; color:#3b82f6; }
        .cart-item-actions { display:flex; gap:0.5rem; }
        .cart-item-actions button { background:#f1f5f9; border:none; width:28px; height:28px; border-radius:50%; cursor:pointer; }
        .cart-total { font-size:1.3rem; font-weight:700; margin:1rem 0; text-align:right; }
        .checkout-btn { background:#10b981; color:white; padding:0.8rem; border-radius:2rem; font-weight:700; width:100%; }
        .overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:999; display:none; }
        .overlay.show { display:block; }
        .modal { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); display:flex; align-items:center; justify-content:center; z-index:1100; }
        .modal-content { background:white; border-radius:2rem; padding:2rem; max-width:500px; width:90%; }
        .form-group { margin-bottom:1rem; }
        .form-control { width:100%; padding:0.8rem 1rem; border:2px solid #e2e8f0; border-radius:1rem; font-size:1rem; }
        .badge { display:inline-block; padding:0.2rem 0.6rem; border-radius:2rem; font-size:0.8rem; font-weight:600; }
        .badge-success { background:#d1fae5; color:#065f46; }
        .badge-warning { background:#fff3cd; color:#856404; }
        .hidden { display:none; }
        footer { text-align:center; margin-top:3rem; color:#6b7280; }
    </style>
</head>
<body>
<div class="container">
    <div class="navbar">
        <div class="logo">
            <i class="fas fa-cube"></i> 
            <span>3</span><span>D</span><span>X</span><span>O</span> STORE
        </div>
        <div class="nav-links">
            <a id="homeLink">Home</a>
            <a id="invoicesLink">Tagihan Saya</a>
            <div id="cartIcon" class="cart-icon">
                <i class="fas fa-shopping-cart"></i>
                <span class="cart-count" id="cartCount">0</span>
            </div>
        </div>
    </div>

    <div class="hero">
        <h1>Solusi Website Profesional</h1>
        <p>Kami membantu bisnis Anda hadir di dunia digital dengan layanan pembuatan website modern, responsif, dan SEO friendly.</p>
    </div>

    <!-- Home / Products -->
    <div id="homePanel">
        <div id="productContainer" class="product-grid"></div>
    </div>

    <!-- Tagihan Saya Panel -->
    <div id="invoicesPanel" style="display:none;">
        <div class="card">
            <h2 class="section-title">Tagihan Saya</h2>
            <div class="form-group">
                <label>Masukkan Email Anda</label>
                <input type="email" id="invoiceEmailInput" class="form-control" placeholder="Email yang digunakan saat checkout atau pendaftaran">
                <button id="viewInvoicesBtn" class="btn btn-primary" style="margin-top:0.5rem;">Lihat Tagihan</button>
            </div>
            <div id="userInvoicesList"></div>
        </div>
    </div>

    <!-- Cart Sidebar -->
    <div class="overlay" id="overlay"></div>
    <div class="cart-sidebar" id="cartSidebar">
        <div class="cart-header">
            <h3>Keranjang Belanja</h3>
            <button class="close-cart" id="closeCart">&times;</button>
        </div>
        <div class="cart-items" id="cartItems"></div>
        <div class="cart-total" id="cartTotal">Total: Rp 0</div>
        <button class="btn checkout-btn" id="checkoutBtn">Checkout</button>
    </div>

    <footer>© 2026 3DXO STORE - Jasa Pembuatan Website Terpercaya</footer>
</div>

<script>
    // Storage keys (same as admin)
    const STORAGE_KEYS = {
        PRODUCTS: '3dxo_products',
        ORDERS: '3dxo_orders',
        INVOICES: '3dxo_invoices',
        CART: '3dxo_cart'
    };

    let products = JSON.parse(localStorage.getItem(STORAGE_KEYS.PRODUCTS)) || [];
    let orders = JSON.parse(localStorage.getItem(STORAGE_KEYS.ORDERS)) || [];
    let invoices = JSON.parse(localStorage.getItem(STORAGE_KEYS.INVOICES)) || [];
    let cart = JSON.parse(localStorage.getItem(STORAGE_KEYS.CART)) || [];

    function saveCart() { localStorage.setItem(STORAGE_KEYS.CART, JSON.stringify(cart)); }

    // Render products
    function renderProducts() {
        const container = document.getElementById('productContainer');
        container.innerHTML = '';
        if (products.length === 0) {
            container.innerHTML = '<div class="card">Belum ada produk.</div>';
            return;
        }
        products.forEach(p => {
            const card = document.createElement('div');
            card.className = 'product-card';
            card.innerHTML = `
                <div class="product-img">${p.image ? `<img src="${p.image}">` : '<i class="fas fa-code fa-3x"></i>'}</div>
                <div class="product-info">
                    <div class="product-title">${p.name}</div>
                    <div class="product-category">${p.category}</div>
                    <div class="product-price">Rp ${p.price.toLocaleString()}</div>
                    <div class="product-desc">${p.desc.substring(0,80)}${p.desc.length>80?'...':''}</div>
                    <button class="btn btn-primary add-to-cart" data-id="${p.id}">Tambah ke Keranjang</button>
                </div>
            `;
            container.appendChild(card);
        });
        document.querySelectorAll('.add-to-cart').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const id = btn.dataset.id;
                const product = products.find(p => p.id === id);
                if (product) addToCart(product);
            });
        });
    }

    function addToCart(product) {
        const existing = cart.find(item => item.id === product.id);
        if (existing) existing.quantity++;
        else cart.push({ ...product, quantity: 1 });
        saveCart();
        updateCartUI();
        updateCartCount();
        openCart();
    }

    function updateCartUI() {
        const cartItemsDiv = document.getElementById('cartItems');
        const cartTotalDiv = document.getElementById('cartTotal');
        cartItemsDiv.innerHTML = '';
        let total = 0;
        cart.forEach(item => {
            total += item.price * item.quantity;
            const div = document.createElement('div');
            div.className = 'cart-item';
            div.innerHTML = `
                <div class="cart-item-info">
                    <h4>${item.name}</h4>
                    <div class="cart-item-price">Rp ${item.price.toLocaleString()}</div>
                </div>
                <div class="cart-item-actions">
                    <button class="cart-minus" data-id="${item.id}">-</button>
                    <span>${item.quantity}</span>
                    <button class="cart-plus" data-id="${item.id}">+</button>
                    <button class="cart-remove" data-id="${item.id}"><i class="fas fa-trash"></i></button>
                </div>
            `;
            cartItemsDiv.appendChild(div);
        });
        cartTotalDiv.textContent = `Total: Rp ${total.toLocaleString()}`;
        document.querySelectorAll('.cart-minus').forEach(btn => btn.addEventListener('click', () => adjustQty(btn.dataset.id, -1)));
        document.querySelectorAll('.cart-plus').forEach(btn => btn.addEventListener('click', () => adjustQty(btn.dataset.id, 1)));
        document.querySelectorAll('.cart-remove').forEach(btn => btn.addEventListener('click', () => removeFromCart(btn.dataset.id)));
    }

    function adjustQty(id, delta) {
        const item = cart.find(i => i.id === id);
        if (item) {
            item.quantity += delta;
            if (item.quantity <= 0) cart = cart.filter(i => i.id !== id);
            saveCart();
            updateCartUI();
            updateCartCount();
        }
    }

    function removeFromCart(id) {
        cart = cart.filter(i => i.id !== id);
        saveCart();
        updateCartUI();
        updateCartCount();
    }

    function updateCartCount() {
        const count = cart.reduce((sum, i) => sum + i.quantity, 0);
        document.getElementById('cartCount').innerText = count;
    }

    // Cart sidebar
    const cartSidebar = document.getElementById('cartSidebar');
    const overlay = document.getElementById('overlay');
    function openCart() { cartSidebar.classList.add('open'); overlay.classList.add('show'); }
    function closeCart() { cartSidebar.classList.remove('open'); overlay.classList.remove('show'); }
    document.getElementById('cartIcon').addEventListener('click', openCart);
    document.getElementById('closeCart').addEventListener('click', closeCart);
    overlay.addEventListener('click', closeCart);

    // Checkout
    document.getElementById('checkoutBtn').addEventListener('click', () => {
        if (cart.length === 0) return alert('Keranjang kosong');
        showCheckoutModal();
    });

    function showCheckoutModal() {
        const modal = document.createElement('div');
        modal.className = 'modal';
        modal.innerHTML = `
            <div class="modal-content">
                <h3>Checkout</h3>
                <div class="form-group">
                    <label>Nama Lengkap</label>
                    <input type="text" id="custName" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="custEmail" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Nomor Telepon</label>
                    <input type="text" id="custPhone" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Catatan</label>
                    <textarea id="custNote" class="form-control" rows="2"></textarea>
                </div>
                <button class="btn btn-primary" id="confirmOrder">Pesan Sekarang</button>
                <button class="btn btn-outline" id="closeModal">Batal</button>
            </div>
        `;
        document.body.appendChild(modal);
        document.getElementById('closeModal').addEventListener('click', () => modal.remove());
        document.getElementById('confirmOrder').addEventListener('click', () => {
            const name = document.getElementById('custName').value.trim();
            const email = document.getElementById('custEmail').value.trim();
            const phone = document.getElementById('custPhone').value.trim();
            if (!name || !email || !phone) return alert('Isi semua');
            const total = cart.reduce((s, i) => s + i.price * i.quantity, 0);
            const newOrder = {
                id: 'ORD'+Date.now(),
                customerName: name,
                customerEmail: email,
                customerPhone: phone,
                note: document.getElementById('custNote').value,
                items: cart.map(i => ({ id: i.id, name: i.name, price: i.price, quantity: i.quantity })),
                total,
                status: 'pending',
                date: new Date().toISOString()
            };
            orders.push(newOrder);
            localStorage.setItem(STORAGE_KEYS.ORDERS, JSON.stringify(orders));
            cart = [];
            saveCart();
            updateCartUI();
            updateCartCount();
            alert('Pesanan berhasil! Admin akan segera menghubungi Anda.');
            modal.remove();
            closeCart();
        });
    }

    // Tagihan Saya
    const homePanel = document.getElementById('homePanel');
    const invoicesPanelDiv = document.getElementById('invoicesPanel');
    const invoicesLink = document.getElementById('invoicesLink');
    const homeLink = document.getElementById('homeLink');

    homeLink.addEventListener('click', () => {
        homePanel.style.display = 'block';
        invoicesPanelDiv.style.display = 'none';
    });
    invoicesLink.addEventListener('click', () => {
        homePanel.style.display = 'none';
        invoicesPanelDiv.style.display = 'block';
    });

    document.getElementById('viewInvoicesBtn').addEventListener('click', () => {
        const email = document.getElementById('invoiceEmailInput').value.trim();
        if (!email) return alert('Masukkan email');
        const userInvoices = invoices.filter(inv => inv.email === email);
        const container = document.getElementById('userInvoicesList');
        container.innerHTML = '';
        if (userInvoices.length === 0) {
            container.innerHTML = '<div class="card">Tidak ada tagihan untuk email ini.</div>';
            return;
        }
        userInvoices.forEach(inv => {
            const div = document.createElement('div');
            div.className = 'invoice-item';
            div.innerHTML = `
                <div><strong>Nominal:</strong> Rp ${inv.amount.toLocaleString()}</div>
                <div><strong>Deskripsi:</strong> ${inv.desc}</div>
                <div><strong>Status:</strong> <span class="badge ${inv.paid ? 'badge-success' : 'badge-warning'}">${inv.paid ? 'Lunas' : 'Belum Dibayar'}</span></div>
                <div><strong>Tanggal:</strong> ${new Date(inv.createdAt).toLocaleString()}</div>
                ${!inv.paid ? `<button class="btn btn-success" onclick="payInvoice('${inv.id}')">Bayar Tagihan</button>` : ''}
            `;
            container.appendChild(div);
        });
    });

    window.payInvoice = (id) => {
        const idx = invoices.findIndex(i => i.id === id);
        if (idx !== -1) {
            invoices[idx].paid = true;
            invoices[idx].paidAt = new Date().toISOString();
            localStorage.setItem(STORAGE_KEYS.INVOICES, JSON.stringify(invoices));
            alert('Pembayaran berhasil (simulasi). Tagihan telah dilunasi.');
            // refresh display
            document.getElementById('viewInvoicesBtn').click();
        }
    };

    // Auto-refresh produk setiap 2 detik
    setInterval(() => {
        const newProducts = JSON.parse(localStorage.getItem(STORAGE_KEYS.PRODUCTS)) || [];
        if (JSON.stringify(products) !== JSON.stringify(newProducts)) {
            products = newProducts;
            renderProducts();
        }
    }, 2000);

    // Initial render
    renderProducts();
    updateCartUI();
    updateCartCount();
</script>
</body>
</html>
